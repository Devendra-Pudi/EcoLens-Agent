version: '3.8'

services:
  ecolens:
    build: .
    container_name: ecolens
    ports:
      - "8000:8000"  # FastAPI
      - "8501:8501"  # Streamlit
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - PYTHONUNBUFFERED=1
    volumes:
      - ./:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  # Optional: PostgreSQL for production
  # postgres:
  #   image: postgres:15-alpine
  #   container_name: ecolens-db
  #   environment:
  #     - POSTGRES_DB=ecolens
  #     - POSTGRES_USER=ecolens
  #     - POSTGRES_PASSWORD=secure_password
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"

  # Optional: Redis for caching
  # redis:
  #   image: redis:7-alpine
  #   container_name: ecolens-cache
  #   ports:
  #     - "6379:6379"

volumes:
  postgres_data:
